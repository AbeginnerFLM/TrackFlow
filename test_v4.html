<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrackFlow</title>
    <style>
        :root {
            --bg: #131314;
            --surface: #1e1f20;
            --hover: #28292a;
            --border: #333536;
            --border-s: #28292a;
            --text: #e3e3e3;
            --text2: #8e918f;
            --text3: #5f6368;
            --accent: #48f08b;
            --accent-dim: rgba(72,240,139,0.12);
            --err: #f28b82;
            --warn: #fdd663;
            --pill: 10rem;
            --rad: 1.2rem;
            --font: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
            --mono: 'SF Mono','Cascadia Code','Consolas',monospace;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{font-size:62.5%}
        body{font-family:var(--font);font-size:1.4rem;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

        .topbar{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 3.2rem;border-bottom:1px solid var(--border-s);position:sticky;top:0;background:var(--bg);z-index:100}
        .logo{font-size:1.8rem;font-weight:600;letter-spacing:-0.02em}.logo span{color:var(--accent)}
        .topbar-r{display:flex;align-items:center;gap:1.2rem}
        .conn-dot{width:.8rem;height:.8rem;border-radius:50%;background:var(--err);transition:background .2s}
        .conn-dot.on{background:var(--accent)}
        .conn-label{font-size:1.2rem;color:var(--text2)}

        .btn{display:inline-flex;align-items:center;gap:.6rem;padding:.7rem 2rem;font-size:1.3rem;font-family:var(--font);font-weight:500;color:var(--text);background:0;border:1px solid var(--border);border-radius:var(--pill);cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none}
        .btn:hover{background:var(--hover);border-color:var(--text2)}
        .btn:disabled{opacity:.3;cursor:not-allowed}.btn:disabled:hover{background:0;border-color:var(--border)}
        .btn-g{background:var(--accent);color:#131314;border-color:var(--accent)}.btn-g:hover{background:#5ff79a;border-color:#5ff79a}
        .btn-g:disabled{background:var(--hover);color:var(--text3);border-color:var(--border)}.btn-g:disabled:hover{background:var(--hover)}
        .btn-r{border-color:var(--err);color:var(--err)}.btn-r:hover{background:rgba(242,139,130,.12)}
        .btn-sm{padding:.4rem 1.4rem;font-size:1.2rem}
        .btn-icon{width:3.4rem;height:3.4rem;padding:0;justify-content:center;border-radius:50%}
        .btn-icon svg{width:1.6rem;height:1.6rem;fill:currentColor}

        .main{max-width:120rem;margin:0 auto;padding:2rem 3.2rem}

        .player-wrap{background:var(--surface);border-radius:var(--rad);border:1px solid var(--border-s);overflow:hidden;margin-bottom:2rem}
        .player{width:100%;aspect-ratio:16/9;background:#0a0a0a;position:relative;overflow:hidden;cursor:grab;display:flex;align-items:center;justify-content:center}
        .player:active{cursor:grabbing}
        .player canvas,.player video{max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;transform-origin:center center}
        .player-placeholder{display:flex;flex-direction:column;align-items:center;gap:1.2rem;color:var(--text3);cursor:pointer;padding:4rem}
        .player-placeholder svg{width:5rem;height:5rem;opacity:.25}
        .player-placeholder p{font-size:1.4rem}
        .player-placeholder small{font-size:1.1rem;opacity:.5}
        .player.dragover{outline:2px solid var(--accent);outline-offset:-2px;background:var(--accent-dim)}

        .timeline{display:flex;align-items:center;gap:1.2rem;padding:1rem 2rem;border-top:1px solid var(--border-s)}
        .progress{flex:1;height:.4rem;background:var(--hover);border-radius:.2rem;cursor:pointer;position:relative}
        .progress-fill{height:100%;background:var(--accent);border-radius:.2rem;width:0%;transition:width .1s linear}
        .time-label{font-size:1.1rem;font-family:var(--mono);color:var(--text3);min-width:8rem;text-align:right}

        .toolbar{display:flex;align-items:center;gap:1rem;padding:1.2rem 2rem;border-top:1px solid var(--border-s)}
        .toolbar .sep{flex:1}
        .fps-sel{background:var(--bg);color:var(--text2);border:1px solid var(--border);border-radius:var(--pill);padding:.4rem 1rem;font-size:1.2rem;font-family:var(--font);cursor:pointer}
        .live-dot{display:inline-flex;align-items:center;gap:.5rem;font-size:1.1rem;font-weight:500;color:var(--accent);visibility:hidden}
        .live-dot .d{width:.6rem;height:.6rem;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

        .stats{display:flex;gap:1px;background:var(--border-s);border-radius:var(--rad);overflow:hidden;margin-bottom:2rem}
        .st{flex:1;background:var(--surface);padding:1.4rem 2rem;text-align:center}
        .st:first-child{border-radius:var(--rad) 0 0 var(--rad)}.st:last-child{border-radius:0 var(--rad) var(--rad) 0}
        .st-v{font-size:2.2rem;font-weight:600;font-family:var(--mono);letter-spacing:-.02em}
        .st-v.hi{color:var(--accent)}
        .st-l{font-size:1rem;color:var(--text3);margin-top:.3rem;text-transform:uppercase;letter-spacing:.06em}

        .log-card{background:var(--surface);border-radius:var(--rad);border:1px solid var(--border-s)}
        .log-hdr{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border-s)}
        .log-hdr span{font-size:1.2rem;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
        .log-body{height:18rem;overflow-y:auto;padding:.8rem 0;scrollbar-width:thin;scrollbar-color:var(--hover) transparent}
        .log-body::-webkit-scrollbar{width:4px}.log-body::-webkit-scrollbar-thumb{background:var(--hover);border-radius:2px}
        .le{padding:.25rem 2rem;font-family:var(--mono);font-size:1.1rem;line-height:1.8;color:var(--text2);display:flex;gap:1rem}
        .le .ts{color:var(--text3);flex-shrink:0}
        .le.success .m{color:var(--accent)}.le.error .m{color:var(--err)}.le.warn .m{color:var(--warn)}
        .log-empty{padding:3rem 2rem;text-align:center;color:var(--text3);font-size:1.2rem}
        input[type="file"]{display:none}
        .hidden{display:none!important}
    </style>
</head>
<body>
    <header class="topbar">
        <div class="logo">Track<span>Flow</span></div>
        <div class="topbar-r">
            <div class="conn-dot" id="cd"></div>
            <span class="conn-label" id="cl">Disconnected</span>
            <button class="btn btn-sm" id="cb" onclick="toggleConn()">Connect</button>
        </div>
    </header>
    <main class="main">
        <div class="player-wrap">
            <div class="player" id="player"
                 ondragover="event.preventDefault();this.classList.add('dragover')"
                 ondragleave="this.classList.remove('dragover')"
                 ondrop="onDrop(event)">
                <div class="player-placeholder" id="ph" onclick="$('fi').click()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
                        <rect x="2" y="4" width="20" height="16" rx="3"/>
                        <path d="M15.6 11.82a.6.6 0 010 1.05l-6 3.6A.6.6 0 019 15.9V8.1a.6.6 0 01.9-.52l6 3.6z"/>
                    </svg>
                    <p>Drop video here or click to open</p>
                    <small>MP4 / WebM / AVI</small>
                </div>
                <video id="vid" style="display:none"></video>
                <canvas id="cvs" style="display:none"></canvas>
            </div>
            <input type="file" id="fi" accept="video/*" onchange="loadVideo(this.files[0])">
            <div class="timeline hidden" id="tl">
                <button class="btn-icon btn" onclick="togglePlay()">
                    <svg viewBox="0 0 24 24" id="ppIco"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <div class="progress" onclick="seek(event)"><div class="progress-fill" id="pf"></div></div>
                <span class="time-label" id="tm">0:00 / 0:00</span>
            </div>
            <div class="toolbar">
                <button class="btn" onclick="$('fi').click()">Open Video</button>
                <button class="btn" id="btnPrev" disabled onclick="preview()">Preview</button>
                <button class="btn btn-g" id="btnInfer" disabled onclick="startInfer()">Inference</button>
                <button class="btn hidden" id="btnPause" onclick="pauseInfer()">Pause</button>
                <button class="btn btn-r hidden" id="btnStop" onclick="stopInfer()">Stop</button>
                <div class="sep"></div>
                <div class="live-dot" id="live"><span class="d"></span>LIVE</div>
                <select class="fps-sel" id="fpsSel" title="Target FPS">
                    <option value="5">5 fps</option>
                    <option value="10" selected>10 fps</option>
                    <option value="15">15 fps</option>
                    <option value="24">24 fps</option>
                    <option value="30">30 fps</option>
                </select>
            </div>
        </div>
        <div class="stats">
            <div class="st"><div class="st-v hi" id="sLat">-</div><div class="st-l">Latency</div></div>
            <div class="st"><div class="st-v" id="sInf">-</div><div class="st-l">Infer ms</div></div>
            <div class="st"><div class="st-v" id="sFps">-</div><div class="st-l">FPS</div></div>
            <div class="st"><div class="st-v" id="sDet">-</div><div class="st-l">Objects</div></div>
            <div class="st"><div class="st-v" id="sFrm">0</div><div class="st-l">Frames</div></div>
        </div>
        <div class="log-card">
            <div class="log-hdr"><span>Log</span><button class="btn btn-sm" onclick="clearLog()">Clear</button></div>
            <div class="log-body" id="logB"><div class="log-empty" id="logE">Ready</div></div>
        </div>
    </main>
<script>
const $=id=>document.getElementById(id);
const vid=$('vid'),cvs=$('cvs'),cx=cvs.getContext('2d');
const cap=document.createElement('canvas'),capCx=cap.getContext('2d');
let ws=null,streaming=false,paused=false,pending=false;
let frameId=0,t0=0,scale=1,targetFps=10,videoLoaded=false;
const colors=['#48f08b','#f28b82','#8ab4f8','#fdd663','#c58af9','#ff8bcb','#36d1a0','#78d9ec','#fcb75e','#a8c7fa'];
const cfg={yolo:{model_path:'models/yolo26.onnx',confidence:0.5,nms_threshold:0.45,use_cuda:true},tracker:{enabled:true}};

/* Connection */
function toggleConn(){ws&&ws.readyState===1?ws.close():connect()}
function connect(){
    const url='ws://'+location.hostname+':9002';
    log('Connecting to '+url+'...');
    ws=new WebSocket(url);
    ws.onopen=()=>{log('Connected','success');setConn(true)};
    ws.onmessage=e=>onMsg(e.data);
    ws.onerror=()=>{log('Connection error','error');setConn(false)};
    ws.onclose=()=>{log('Disconnected');setConn(false);if(streaming)stopInfer()};
}
function setConn(on){
    $('cd').classList.toggle('on',on);
    $('cl').textContent=on?'Connected':'Disconnected';
    $('cb').textContent=on?'Disconnect':'Connect';
    $('btnInfer').disabled=!on||!videoLoaded;
}

/* Video */
function loadVideo(f){
    if(!f)return;
    vid.src=URL.createObjectURL(f);
    vid.style.display='block';cvs.style.display='none';
    $('ph').style.display='none';$('tl').classList.remove('hidden');
    vid.onloadedmetadata=()=>{
        cap.width=Math.min(vid.videoWidth,1280);
        const s=cap.width/vid.videoWidth;
        cap.height=Math.round(vid.videoHeight*s);
        scale=vid.videoWidth/cap.width;
        cvs.width=vid.videoWidth;cvs.height=vid.videoHeight;
        videoLoaded=true;
        $('btnPrev').disabled=false;
        setConn(ws&&ws.readyState===1);
        log('Loaded: '+f.name+' ('+vid.videoWidth+'x'+vid.videoHeight+', '+fmt(vid.duration)+')','success');
    };
}
function onDrop(e){e.preventDefault();e.currentTarget.classList.remove('dragover');const f=e.dataTransfer?.files?.[0];if(f&&f.type.startsWith('video/'))loadVideo(f)}
vid.addEventListener('timeupdate',()=>{
    $('pf').style.width=(vid.currentTime/vid.duration*100||0)+'%';
    $('tm').textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration);
});
function togglePlay(){vid.paused?vid.play():vid.pause();ppIco()}
function seek(e){const r=e.currentTarget.getBoundingClientRect();vid.currentTime=(e.clientX-r.left)/r.width*vid.duration}
function ppIco(){$('ppIco').innerHTML=vid.paused?'<path d="M8 5v14l11-7z"/>':'<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>'}
function fmt(s){if(!isFinite(s))return'0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return m+':'+(sc<10?'0':'')+sc}

/* Preview: just play the video without inference */
function preview(){
    if(!videoLoaded)return;
    vid.style.display='block';cvs.style.display='none';
    vid.currentTime=0;vid.play();ppIco();
}

/* Inference */
function startInfer(){
    if(!ws||ws.readyState!==1||!videoLoaded)return;
    streaming=true;paused=false;pending=false;frameId=0;
    vid.currentTime=0;vid.play();ppIco();
    targetFps=+$('fpsSel').value;
    $('btnInfer').classList.add('hidden');$('btnPrev').classList.add('hidden');
    $('btnPause').classList.remove('hidden');$('btnStop').classList.remove('hidden');
    $('live').style.visibility='visible';
    vid.style.display='none';cvs.style.display='block';
    log('Inference started ('+targetFps+' fps)','success');
    sendNext();
}
function pauseInfer(){
    paused=!paused;
    if(paused){vid.pause();$('btnPause').textContent='Resume'}
    else{vid.play();$('btnPause').textContent='Pause';if(!pending)sendNext()}
    ppIco();
}
function stopInfer(){
    streaming=false;paused=false;pending=false;vid.pause();ppIco();
    $('btnInfer').classList.remove('hidden');$('btnPrev').classList.remove('hidden');
    $('btnPause').classList.add('hidden');$('btnStop').classList.add('hidden');
    $('btnPause').textContent='Pause';$('live').style.visibility='hidden';
    vid.style.display='block';cvs.style.display='none';
    log('Stopped at frame '+frameId);
}
function sendNext(){
    if(!streaming||paused||pending)return;
    if(vid.ended){stopInfer();return}
    capCx.drawImage(vid,0,0,cap.width,cap.height);
    cap.toBlob(b=>{
        if(!streaming||!b)return;
        b.arrayBuffer().then(buf=>{
            if(!streaming)return;
            frameId++;t0=performance.now();pending=true;
            ws.send(JSON.stringify({type:'infer_header',request_id:'f_'+frameId,frame_id:frameId,config:cfg}));
            ws.send(buf);
        });
    },'image/jpeg',0.85);
}

/* Response */
function onMsg(data){
    try{
        const r=JSON.parse(data);
        if(r.type==='pong'){log('Pong','success');return}
        if(r.type==='error'){log('Error: '+(r.error||'unknown'),'error');pending=false;return}
        const lat=performance.now()-t0,det=r.detections||[],tm=r.timing||{};
        $('sLat').textContent=lat.toFixed(0);
        $('sInf').textContent=(tm.infer_ms||0).toFixed(0);
        $('sFps').textContent=(1000/lat).toFixed(1);
        $('sDet').textContent=det.length;
        $('sFrm').textContent=frameId;
        draw(det);
        pending=false;
        if(streaming&&!paused){
            const delay=Math.max(0,1000/targetFps-lat);
            delay>0?setTimeout(sendNext,delay):sendNext();
        }
    }catch(e){log('Parse error: '+e.message,'error')}
}

/* Draw */
function draw(dets){
    cx.drawImage(cap,0,0,cvs.width,cvs.height);
    const lw=Math.max(2,Math.round(cvs.width/400));
    const fs=Math.max(13,Math.round(cvs.width/70));
    cx.lineWidth=lw;cx.font='bold '+fs+'px Inter,sans-serif';
    for(const d of dets){
        const c=colors[d.class_id%colors.length];
        cx.strokeStyle=c;
        if(d.obb){
            const p=d.obb.map(v=>v*scale);
            cx.beginPath();cx.moveTo(p[0],p[1]);cx.lineTo(p[2],p[3]);cx.lineTo(p[4],p[5]);cx.lineTo(p[6],p[7]);cx.closePath();cx.stroke();
            const lb=(d.class_name||d.class_id)+' '+(d.confidence*100|0)+'%';
            const tw=cx.measureText(lb).width+8,th=fs+4;
            cx.fillStyle=c;cx.fillRect(p[0],p[1]-th,tw,th);
            cx.fillStyle='#000';cx.fillText(lb,p[0]+4,p[1]-4);
            if(d.track_id>=0){cx.fillStyle='#fff';cx.fillText('ID:'+d.track_id,p[0],p[1]+fs+2)}
        }else if(d.bbox){
            const x=d.bbox[0]*scale,y=d.bbox[1]*scale,w=d.bbox[2]*scale,h=d.bbox[3]*scale;
            cx.strokeRect(x,y,w,h);
            const lb=(d.class_name||d.class_id)+' '+(d.confidence*100|0)+'%';
            const tw=cx.measureText(lb).width+8,th=fs+4;
            cx.fillStyle=c;cx.fillRect(x,y-th,tw,th);cx.fillStyle='#000';cx.fillText(lb,x+4,y-4);
            if(d.track_id>=0){cx.fillStyle='#fff';cx.fillText('ID:'+d.track_id,x,y+fs+2)}
        }
    }
}

/* Pan & Zoom */
!function(){
    const el=$('player');let s=1,px=0,py=0,pan=false,sx,sy;
    function tr(){const t=cvs.style.display!=='none'?cvs:vid;t.style.transform='translate('+px+'px,'+py+'px) scale('+s+')'}
    el.addEventListener('wheel',e=>{e.preventDefault();const r=el.getBoundingClientRect(),xs=(e.clientX-r.left-px)/s,ys=(e.clientY-r.top-py)/s;s*=e.deltaY<0?1.12:.89;s=Math.min(Math.max(.5,s),12);px=e.clientX-r.left-xs*s;py=e.clientY-r.top-ys*s;tr()});
    el.addEventListener('mousedown',e=>{if(e.target.closest('.player-placeholder'))return;pan=true;sx=e.clientX-px;sy=e.clientY-py;el.style.cursor='grabbing'});
    window.addEventListener('mouseup',()=>{pan=false;el.style.cursor='grab'});
    window.addEventListener('mousemove',e=>{if(!pan)return;e.preventDefault();px=e.clientX-sx;py=e.clientY-sy;tr()});
    el.addEventListener('dblclick',()=>{s=1;px=0;py=0;tr()});
}();

/* Global drop */
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer?.files?.[0];if(f&&f.type.startsWith('video/'))loadVideo(f)});
</script>
</body>
</html>
